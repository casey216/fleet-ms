{% extends "base.html" %}
{% block title %}New Alert — FleetHQ{% endblock %}

{% block breadcrumb %}
<div class="breadcrumb">
    <a href="/alerts">Alerts</a>
    <span class="sep">/</span>
    <span class="current">New Alert</span>
</div>
{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Create Alert</h1>
        <p class="page-subtitle">Manually create an alert for a vehicle or fleet-wide</p>
    </div>
</div>

<div class="card" style="max-width:580px;">
    <form method="post" action="/alerts/new">

        <h3
            style="font-size:14px;font-weight:600;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);">
            <i class="fa-solid fa-bell" style="margin-right:8px;color:var(--warning)"></i>Alert Details
        </h3>

        <div class="form-group">
            <label class="form-label">Title *</label>
            <input type="text" name="title" class="form-input" placeholder="e.g. Insurance renewal required"
                value="{{ alert.title if alert else '' }}" required>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Alert Type *</label>
                <select name="alert_type" class="form-select" required>
                    {% for at in alert_types %}
                    <option value="{{ at }}" {% if alert and alert.alert_type.value==at %}selected{% endif %}>
                        {{ at.replace('_',' ').title() }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Vehicle <span
                        style="color:var(--text-muted);font-weight:400;">(optional)</span></label>
                <select name="vehicle_id" class="form-select">
                    <option value="">— Fleet-wide —</option>
                    {% for v in vehicles %}
                    <option value="{{ v.id }}" {% if alert and alert.vehicle_id==v.id %}selected {% elif
                        selected_vehicle==v.id %}selected{% endif %}>
                        {{ v.license_plate }} — {{ v.make }} {{ v.model }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Due Date</label>
            <input type="date" name="due_date" class="form-input"
                value="{{ alert.due_date.isoformat() if alert and alert.due_date else '' }}">
            <span class="form-hint">The date by which action is required</span>
        </div>

        <div class="form-group">
            <label class="form-label">Message</label>
            <textarea name="message" class="form-textarea" rows="3"
                placeholder="Describe what action needs to be taken…">{{ alert.message or '' if alert else '' }}</textarea>
        </div>

        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
            <a href="/alerts" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-bell"></i> Create Alert
            </button>
        </div>
    </form>
</div>
{% endblock %}
